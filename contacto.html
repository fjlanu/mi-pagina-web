<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Contacto - FL Inversiones & Mercados</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
     * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background-image: url("img/pantalla-grafico-que-dice-palabra-financiera_188544-27324.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: rgb(221, 222, 227);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background-color: #f5f6f5;
}

.logo img {
  height: 100px; /* Cambiá este valor para hacerlo más chico o más grande */
  max-height: 70px;
  width: auto;
}

  nav a {
    color: rgba(14, 1, 1, 0.918);
    margin-right: 20px;
    text-decoration: none;
    font-weight: bold;
  }

  .abrir-cuenta {
    background-color: rgba(3, 11, 23, 0.113);
    color: #00050b;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
  }

  .abrir-cuenta:hover {
    background-color: #f0eaea78;
  }

  main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  text-align: left;
  padding: 90px 300px;
}

main h1 {
  font-size: 2.8em;
  margin-bottom: 20px;
  padding: 20px;
  border-radius: 10px;
  color: white;
  max-width: 800px;
 }

 main p {
  font-size: 1.8em;
  margin-bottom: 20px;
  padding: 20px;
  border-radius: 10px;
  color: white;
  max-width: 800px;
 }

 form {
  display: flex;
  flex-direction: column;
  gap: 20px;
  background-color: rgba(0, 0, 0, 0.3);
  padding: 30px;
  border-radius: 20px;
  width: 100%;
  max-width: 800px;
}

.campos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.campos div {
  display: flex;
  flex-direction: column;
}

input, textarea {
  font-size: 1em;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

textarea {
  min-height: 120px;
  width: 100%;
  font-size: 1em;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  box-sizing: border-box;
}


button {
  align-self: flex-start;
  padding: 12px 24px;
  font-weight: bold;
  background-color: white;
  color: #0056b3;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background-color: #e0e0e0;
}

  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="img/logo.png" alt="Logo FL" />
    </div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="comunidad.html">Comunidad</a>
      <a href="nosotros.html">Nosotros</a>
      <a href="contacto.html">Contacto</a>
    </nav>
    <a class="abrir-cuenta" href="https://www.balanz.com/abrir-cuenta-2.aspx?reference=flanusse@balanz.com">Abrir Cuenta</a>
  </header>

  <main>
    <h1>¿Querés desarrollar una consulta más detallada?</h1>
    <p>Podés comunicarte con nosotros a través de este formulario</p>

    <form>
  <div class="campos">
    <div>
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required />
    </div>
    <div>
      <label for="apellido">Apellido</label>
      <input type="text" id="apellido" name="apellido" required />
    </div>
    <div>
      <label for="mail">Mail</label>
      <input type="email" id="mail" name="mail" required />
    </div>
    <div>
      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" />
    </div>
  </div>

  <!-- FUERA de .campos -->
  <div>
    <label for="mensaje">Mensaje</label>
    <textarea id="mensaje" name="mensaje" placeholder="Escribí tu consulta..." required></textarea>
  </div>

  <button type="submit">Enviar</button>
</form>


  </main>

</body>
</html>
